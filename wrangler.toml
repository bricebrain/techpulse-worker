name = "techpulse-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "techpulse"
database_id = "9dbf5d5f-1fef-488d-ab5c-5c24de9e3d95"

[[r2_buckets]]
binding = "PODCASTS"
bucket_name = "techpulse-podcasts"

[ai]
binding = "AI"

[triggers]
crons = ["0 */2 * * *", "0 6 * * *", "0 7 * * *", "0 6 * * 5"]  # articles 2h + podcast 6h + suggestions 7h + deep dive vendredi 6h
